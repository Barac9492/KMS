name: KMS Weekly Signal

on:
  schedule:
    # Monday 08:30 KST = Sunday 23:30 UTC
    - cron: '30 23 * * 0'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore trend cache
        uses: actions/cache@v4
        with:
          path: data/trend_cache
          key: trend-cache-${{ github.run_number }}
          restore-keys: trend-cache-

      - name: Restore ETF cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: etf-cache-${{ github.run_number }}
          restore-keys: etf-cache-

      - name: Run KMS signal generation
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py
